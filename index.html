<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WANN MARKET | Wann Coin Market</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: all 0.5s ease;
        }

        body {
            background: #050508;
            min-height: 100vh;
            color: #fff;
        }

        .neon-text {
            text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff66;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: linear-gradient(135deg, #050508 0%, #0a0a14 100%);
            min-height: 100vh;
            position: relative;
            padding-bottom: 75px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #00ffff55;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .app-header h2 {
            font-size: 1.2rem;
            color: #00ffff;
        }

        .logout-btn {
            background: rgba(255, 51, 102, 0.2);
            border: 1px solid #ff3366;
            color: #ff3366;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #ff3366;
            color: #fff;
            box-shadow: 0 0 15px #ff3366;
        }

        .form-container {
            padding: 2rem;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            margin: 1rem;
            border: 1px solid #00ffff55;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00ffff;
            font-size: 0.85rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff88;
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 20px #00ffff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ffff, #0088ff);
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px #00ffff;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 20px;
            border-top: 2px solid #00ffff;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #666;
            font-size: 11px;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 20px;
        }

        .nav-item.active {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .nav-item span:first-child {
            font-size: 24px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }

        .product-card {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #00ffff55;
            position: relative;
        }

        .product-card:hover {
            border-color: #00ffff;
            box-shadow: 0 0 25px #00ffff;
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
        }

        .delete-product-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff3366;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 16px;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .admin-section {
            padding: 1rem;
        }

        .admin-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border: 1px solid #ff44ff55;
        }

        .user-item {
            border-bottom: 1px solid #00ffff33;
            padding: 12px;
            margin-bottom: 8px;
        }

        .profile-header {
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, #00ffff22, #0088ff22);
            border-radius: 30px;
            margin: 1rem;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00ffff;
            box-shadow: 0 0 30px #00ffff;
            margin-bottom: 1rem;
            cursor: pointer;
        }

        .change-photo-btn {
            background: rgba(0, 255, 255, 0.3);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
        }

        .action-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            border: 1px solid #00ffff55;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-content {
            background: #0a0a14;
            border-radius: 30px;
            padding: 1.5rem;
            max-width: 450px;
            width: 100%;
            border: 2px solid #00ffff;
            box-shadow: 0 0 50px #00ffff;
            max-height: 90vh;
            overflow-y: auto;
        }

        .hidden {
            display: none !important;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ffff;
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 1001;
            font-weight: bold;
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }
            70% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) scale(0.9);
                visibility: hidden;
            }
        }

        .welcome-banner {
            background: linear-gradient(135deg, #00ffff20, #0088ff20);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border: 1px solid #00ffff;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .button-group button {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
        }

        .history-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #00ffff;
        }

        .file-info {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .download-btn {
            background: #00ffff20;
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
        }

        .payment-warning {
            background: #ff336620;
            border: 1px solid #ff3366;
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
            text-align: center;
            color: #ff8888;
            font-size: 12px;
        }

        .developer-badge {
            background: #ff44ff;
            color: #000;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <div id="authContainer"></div>
        <div id="mainApp" class="hidden"></div>
        <div id="bottomNav" class="bottom-nav hidden"></div>
    </div>

    <script>
        // ==================== DATABASE ====================
        let db = {
            getUsers: () => JSON.parse(localStorage.getItem('users') || '[]'),
            saveUsers: (users) => localStorage.setItem('users', JSON.stringify(users)),
            getProducts: () => JSON.parse(localStorage.getItem('products') || '[]'),
            saveProducts: (products) => localStorage.setItem('products', JSON.stringify(products)),
            getPaymentMethods: () => JSON.parse(localStorage.getItem('paymentMethods') || '[]'),
            savePaymentMethods: (methods) => localStorage.setItem('paymentMethods', JSON.stringify(methods)),
            getTransactions: () => JSON.parse(localStorage.getItem('transactions') || '[]'),
            saveTransactions: (transactions) => localStorage.setItem('transactions', JSON.stringify(transactions))
        };

        // Initialize Database
        if (!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify([{
                id: 'dev_1',
                email: 'raffsopspoken@gmail.com',
                username: 'WannTheClown',
                password: 'WannTheClown',
                role: 'developer',
                avatar: '',
                coins: 999999,
                isBanned: false
            }]));
        }
        if (!localStorage.getItem('products')) localStorage.setItem('products', '[]');
        if (!localStorage.getItem('paymentMethods')) {
            localStorage.setItem('paymentMethods', JSON.stringify([
                { id: 'bank_1', type: 'bank', bankName: 'BCA', accountNumber: '1234567890', accountName: 'WANN MARKET' },
                { id: 'ewallet_1', type: 'ewallet', platform: 'dana', number: '081234567890', name: 'WANN STORE' },
                { id: 'manual_1', type: 'manual', contactLink: 'https://t.me/Wann_Jir', name: 'Admin WANN' }
            ]));
        }
        if (!localStorage.getItem('transactions')) localStorage.setItem('transactions', '[]');

        let currentUser = null;
        let currentMenu = 'beranda';

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#ff3366' : '#00ffff';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function downloadFile(content, fileName, mimeType = 'application/octet-stream') {
            // Jika content adalah base64 data URL, konversi ke blob
            let blob;
            if (content.startsWith('data:')) {
                const byteString = atob(content.split(',')[1]);
                const mime = content.split(',')[0].split(':')[1].split(';')[0];
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                for (let i = 0; i < byteString.length; i++) {
                    ia[i] = byteString.charCodeAt(i);
                }
                blob = new Blob([ab], { type: mime });
            } else {
                blob = new Blob([content], { type: mimeType });
            }

            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function generateStrukContent(product, userName, transactionId) {
            return `
╔══════════════════════════════════════════════════════════════════╗
║                    WANN MARKET - STRUK PEMBELIAN                 ║
╠══════════════════════════════════════════════════════════════════╣
║  🛒 PRODUK: ${product.nama}
║  📦 ID PRODUK: ${product.id}
║  💰 HARGA: ${product.hargaCoin} COIN
║  👤 PEMBELI: ${userName}
║  📅 TANGGAL: ${new Date().toLocaleString()}
║  🔑 KODE TRANSAKSI: ${transactionId}
╠══════════════════════════════════════════════════════════════════╣
║  ✨ Terima kasih telah berbelanja di WANN MARKET! ✨
║  🚀 File produk telah didownload bersama struk ini.
╚══════════════════════════════════════════════════════════════════╝
            `;
        }

        function getPurchaseHistory() {
            return JSON.parse(localStorage.getItem('purchaseHistory_' + (currentUser?.id || '')) || '[]');
        }

        function savePurchaseHistory(history) {
            localStorage.setItem('purchaseHistory_' + (currentUser?.id || ''), JSON.stringify(history));
        }

        function render() {
            if (!currentUser) renderAuth();
            else renderMainApp();
        }

        // ==================== AUTH ====================
        function renderAuth() {
            document.getElementById('authContainer').innerHTML = `
            <div class="form-container">
                <h1 class="neon-text" style="text-align:center;">✨ WANN MARKET ✨</h1>
                <p style="text-align:center; margin:1rem 0; color:#00ffffaa;">Wann Coin Market</p>
                <div style="display:flex; gap:1rem; margin-bottom:2rem;">
                    <button class="btn-primary" id="showLoginBtn" style="background:#00ffff20; color:#00ffff;">🔐 LOGIN</button>
                    <button class="btn-primary" id="showRegisterBtn" style="background:#00ffff20; color:#00ffff;">📝 DAFTAR</button>
                </div>
                <div id="authForm"></div>
            </div>
        `;
            document.getElementById('showLoginBtn').onclick = () => showLoginForm();
            document.getElementById('showRegisterBtn').onclick = () => showRegisterForm();
            showLoginForm();
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('bottomNav').classList.add('hidden');
            document.getElementById('authContainer').classList.remove('hidden');
        }

        function showLoginForm() {
            document.getElementById('authForm').innerHTML = `
            <div class="form-group"><label>📧 Email</label><input type="email" id="loginEmail" class="neon-border"></div>
            <div class="form-group"><label>🔒 Password</label><input type="password" id="loginPassword" class="neon-border"></div>
            <button class="btn-primary" id="doLoginBtn">🚀 LOGIN</button>
        `;
            document.getElementById('doLoginBtn').onclick = () => {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const user = db.getUsers().find(u => u.email === email && u.password === password);
                if (!user) return showToast('❌ Email atau password salah!', true);
                if (user.isBanned) return showToast('⛔ User ini telah terbanned!', true);
                currentUser = user;
                const roleText = currentUser.role === 'developer' ? ' (Developer)' : currentUser.role === 'admin' ? ' (Admin)' : '';
                showToast(`✨ Halo ${user.username}${roleText}, selamat berbelanja! ✨`);
                render();
            };
        }

        function showRegisterForm() {
            document.getElementById('authForm').innerHTML = `
            <div class="form-group"><label>📸 Foto Profil (dari galeri)</label><input type="file" id="registerAvatar" accept="image/*"></div>
            <div class="form-group"><label>📧 Email</label><input type="email" id="registerEmail"></div>
            <div class="form-group"><label>👤 Username</label><input type="text" id="registerUsername"></div>
            <div class="form-group"><label>🔒 Password</label><input type="password" id="registerPassword"></div>
            <div class="form-group"><label>🔒 Konfirmasi Password</label><input type="password" id="registerConfirmPassword"></div>
            <button class="btn-primary" id="doRegisterBtn">📝 DAFTAR</button>
        `;
            document.getElementById('doRegisterBtn').onclick = () => {
                const file = document.getElementById('registerAvatar').files[0];
                const email = document.getElementById('registerEmail').value;
                const username = document.getElementById('registerUsername').value;
                const pass = document.getElementById('registerPassword').value;
                const confirm = document.getElementById('registerConfirmPassword').value;
                if (!email || !username || !pass) return showToast('❌ Semua field harus diisi!', true);
                if (pass !== confirm) return showToast('❌ Password tidak sama!', true);
                if (db.getUsers().find(u => u.email === email)) return showToast('❌ Email sudah terdaftar!', true);

                const saveUser = (avatar) => {
                    const users = db.getUsers();
                    users.push({
                        id: Date.now().toString(),
                        email,
                        username,
                        password: pass,
                        role: 'user',
                        avatar,
                        coins: 0,
                        isBanned: false
                    });
                    db.saveUsers(users);
                    showToast('✅ Pendaftaran berhasil! Silakan login.');
                    showLoginForm();
                };
                if (file) {
                    const reader = new FileReader();
                    reader.onload = e => saveUser(e.target.result);
                    reader.readAsDataURL(file);
                } else saveUser('');
            };
        }

        // ==================== MAIN APP ====================
        function renderMainApp() {
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('bottomNav').classList.remove('hidden');

            const navItems = [{
                    id: 'beranda',
                    icon: '🏠',
                    label: 'Beranda'
                },
                {
                    id: 'produk',
                    icon: '📦',
                    label: 'Produk'
                },
                {
                    id: 'history',
                    icon: '📜',
                    label: 'History'
                },
                {
                    id: 'profil',
                    icon: '👤',
                    label: 'Profil'
                },
                {
                    id: 'coin',
                    icon: '🪙',
                    label: 'Coin'
                }
            ];

            if (currentUser && (currentUser.role === 'admin' || currentUser.role === 'developer')) {
                navItems.push({
                    id: 'admin',
                    icon: '⚙️',
                    label: 'Admin'
                });
            }

            document.getElementById('bottomNav').innerHTML = navItems.map(item => `<button class="nav-item ${currentMenu === item.id ? 'active' : ''}" data-menu="${item.id}"><span>${item.icon}</span><span>${item.label}</span></button>`).join('');

            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.onclick = () => {
                    currentMenu = btn.dataset.menu;
                    renderMainApp();
                };
            });

            const roleBadge = currentUser.role === 'developer' ? '<span class="developer-badge">⭐ DEVELOPER</span>' : (currentUser.role === 'admin' ? '<span class="developer-badge" style="background:#00ffff;">👑 ADMIN</span>' : '');

            document.getElementById('mainApp').innerHTML = `<div class="app-header"><h2 class="neon-text">✨ WANN MARKET ✨ ${roleBadge}</h2><button class="logout-btn" id="logoutBtn">🚪 LOGOUT</button></div><div id="mainContent"></div>`;
            document.getElementById('logoutBtn').onclick = () => {
                const modal = document.createElement('div');
                modal.innerHTML = `<div class="modal-overlay"><div class="modal-content confirm-dialog"><p>⚠️ Yakin ingin keluar dari akun?</p><div class="confirm-buttons"><button class="btn-primary" id="confirmLogout" style="background:#ff3366;">Ya, Keluar</button><button class="btn-primary" id="cancelLogout">Tidak, Kembali</button></div></div></div>`;
                document.body.appendChild(modal);
                document.getElementById('confirmLogout').onclick = () => {
                    currentUser = null;
                    modal.remove();
                    render();
                };
                document.getElementById('cancelLogout').onclick = () => modal.remove();
            };

            renderMainContent();
        }

        function renderMainContent() {
            const content = document.getElementById('mainContent');
            if (currentMenu === 'beranda') content.innerHTML = renderBeranda();
            else if (currentMenu === 'produk') content.innerHTML = renderProduk();
            else if (currentMenu === 'history') content.innerHTML = renderHistory();
            else if (currentMenu === 'profil') content.innerHTML = renderProfil();
            else if (currentMenu === 'coin') content.innerHTML = renderCoin();
            else if (currentMenu === 'admin') content.innerHTML = renderAdmin();

            setTimeout(() => attachEventListeners(), 100);
        }

        function renderBeranda() {
            const products = db.getProducts().filter(p => p.stok > 0);
            return `<div style="padding:1rem;"><div class="welcome-banner"><h2 class="neon-text">✨ SELAMAT BERBELANJA ✨</h2><p>KAMI MELAYANI DENGAN OTOMATIS</p></div><h3>🔥 Produk Terbaru</h3><div class="products-grid">${products.length ? products.map(p => `
            <div class="product-card" data-id="${p.id}">
                ${(currentUser.role === 'admin' || currentUser.role === 'developer') ? `<button class="delete-product-btn" data-delete="${p.id}">✖</button>` : ''}
                <img src="${p.foto || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
                <h4>${p.nama}</h4>
                <p style="color:#00ffff;">💰 ${p.hargaCoin} Coin</p>
                <p>📦 Stok: ${p.stok}</p>
                <button class="btn-primary buy-btn" data-id="${p.id}" data-nama="${p.nama}" data-harga="${p.hargaCoin}" style="margin-top:10px; font-size:12px; padding:8px;">🛒 Beli</button>
            </div>`).join('') : '<p style="text-align:center;">🚫 Tidak Ada Produk</p>'}</div></div>`;
        }

        function renderProduk() {
            const products = db.getProducts().filter(p => p.stok > 0);
            return `<div class="products-grid">${products.length ? products.map(p => `
            <div class="product-card" data-id="${p.id}">
                ${(currentUser.role === 'admin' || currentUser.role === 'developer') ? `<button class="delete-product-btn" data-delete="${p.id}">✖</button>` : ''}
                <img src="${p.foto || 'https://via.placeholder.com/150'}">
                <h4>${p.nama}</h4>
                <p style="color:#00ffff;">💰 ${p.hargaCoin} Coin</p>
                <p>📦 Stok: ${p.stok}</p>
                <button class="btn-primary buy-btn" data-id="${p.id}" data-nama="${p.nama}" data-harga="${p.hargaCoin}" style="margin-top:10px; font-size:12px;">🛒 Beli</button>
            </div>`).join('') : '<p style="text-align:center; padding:2rem;">🚫 Tidak Ada Produk</p>'}</div>`;
        }

        function renderHistory() {
            const history = getPurchaseHistory();
            if (history.length === 0) {
                return `<div style="padding:2rem; text-align:center;"><p>📭 Belum ada history pembelian</p><p style="color:#888; margin-top:10px;">Silakan beli produk terlebih dahulu</p></div>`;
            }
            return `
            <div style="padding:1rem;">
                <h2 class="neon-text" style="text-align:center; margin-bottom:1rem;">📜 HISTORY PEMBELIAN</h2>
                ${history.map((item, idx) => `
                    <div class="history-item">
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                            <div>
                                <h3>🛒 ${item.productName}</h3>
                                <p>💰 ${item.price} Coin</p>
                                <p>📅 ${item.date}</p>
                                <p>🔑 Kode: ${item.transactionId}</p>
                            </div>

        function attachEventListeners() {
            // Buy Product - DOWNLOAD FILE PRODUK ASLI
            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const productId = btn.dataset.id;
                    const product = db.getProducts().find(p => p.id === productId);
                    if (product && product.stok > 0 && currentUser.coins >= product.hargaCoin) {
                        // Kurangi coin user
                        currentUser.coins -= product.hargaCoin;
                        // Kurangi stok produk
                        product.stok--;

                        const users = db.getUsers();
                        const userIndex = users.findIndex(u => u.id === currentUser.id);
                        users[userIndex] = currentUser;
                        db.saveUsers(users);
                        db.saveProducts(db.getProducts().map(p => p.id === product.id ? product : p));

                        const transactionId = `WANN-MARKET-${Date.now()}`;
                        const strukContent = generateStrukContent(product, currentUser.username, transactionId);
                        
                        // DOWNLOAD FILE PRODUK ASLI
                        if (product.fileData) {
                            const fileName = product.fileName || `PRODUK_WANN_${product.nama.replace(/\s/g, '_')}.bin`;
                            downloadFile(product.fileData, fileName);
                            showToast(`✅ Berhasil membeli ${product.nama}! File produk sedang didownload.`);
                        } else {
                            // Jika tidak ada file, download struk saja
                            const fileName = `STRUK_WANN_${product.nama.replace(/\s/g, '_')}.txt`;
                            downloadFile(strukContent, fileName, 'text/plain');
                            showToast(`✅ Berhasil membeli ${product.nama}! (Struk didownload, file produk tidak tersedia)`);
                        }

                        // Simpan ke history
                        const history = getPurchaseHistory();
                        history.push({
                            productId: product.id,
                            productName: product.nama,
                            price: product.hargaCoin,
                            date: new Date().toLocaleString(),
                            transactionId: transactionId,
                            strukContent: strukContent,
                            fileData: product.fileData || null,
                            fileName: product.fileName || null
                        });
                        savePurchaseHistory(history);

                        render();
                    } else if (product && product.stok <= 0) {
                        showToast('❌ Stok produk habis!', true);
                    } else {
                        showToast('❌ Coin tidak cukup! Silakan top up.', true);
                    }
                };
            });

            // Download struk dari history
            document.querySelectorAll('[data-download-struk]').forEach(btn => {
                btn.onclick = () => {
                    const fileName = `STRUK_WANN_${btn.dataset.name}.txt`;
                    downloadFile(btn.dataset.content, fileName, 'text/plain');
                    showToast(`✅ Download struk ${btn.dataset.name}`);
                };
            });

            // Download file produk dari history
            document.querySelectorAll('[data-download-file]').forEach(btn => {
                btn.onclick = () => {
                    const fileName = btn.dataset.filename || `PRODUK_WANN_${btn.dataset.name}.bin`;
                    downloadFile(btn.dataset.file, fileName);
                    showToast(`✅ Download file ${btn.dataset.name}`);
                };
            });

            // Delete product from card
            document.querySelectorAll('[data-delete]').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    if (confirm('Hapus produk ini?')) {
                        let products = db.getProducts();
                        products = products.filter(p => p.id !== btn.dataset.delete);
                        db.saveProducts(products);
                        showToast('✅ Produk dihapus!');
                        render();
                    }
                };
            });

            // Change password
            const ubahPassword = document.getElementById('ubahPasswordBtn');
            if (ubahPassword) {
                ubahPassword.onclick = () => {
                    const modal = document.createElement('div');
                    modal.innerHTML = `<div class="modal-overlay"><div class="modal-content"><h3>🔒 Ubah Password</h3><div class="form-group"><label>Password Baru</label><input type="password" id="newPass"></div><div class="form-group"><label>Konfirmasi</label><input type="password" id="confirmPass"></div><button class="btn-primary" id="savePassBtn">Simpan</button><button class="btn-primary" id="closePassBtn" style="background:#666;">Batal</button></div></div>`;
                    document.body.appendChild(modal);
                    document.getElementById('savePassBtn').onclick = () => {
                        const newPass = document.getElementById('newPass').value;
                        const confirm = document.getElementById('confirmPass').value;
                        if (newPass !== confirm) return showToast('❌ Password tidak sama!', true);
                        if (!newPass) return showToast('❌ Password tidak boleh kosong!', true);
                        currentUser.password = newPass;
                        const users = db.getUsers();
                        users[users.findIndex(u => u.id === currentUser.id)] = currentUser;
                        db.saveUsers(users);
                        showToast('✅ Password berhasil diubah!');
                        modal.remove();
                        render();
                    };
                    document.getElementById('closePassBtn').onclick = () => modal.remove();
                };
            }

            // Change photo profile
            const changePhoto = document.getElementById('changePhotoBtn');
            if (changePhoto) {
                changePhoto.onclick = () => {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                currentUser.avatar = ev.target.result;
                                const users = db.getUsers();
                                users[users.findIndex(u => u.id === currentUser.id)] = currentUser;
                                db.saveUsers(users);
                                showToast('✅ Foto profil diubah!');
                                render();
                            };
                            reader.readAsDataURL(file);
                        }
                    };
                    input.click();
                };
            }

            // Top up button
            const topUpBtn = document.getElementById('topUpCoinBtn');
            if (topUpBtn) {
                topUpBtn.onclick = () => {
                    currentMenu = 'coin';
                    renderMainApp();
                };
            }

            // Payment method change
            const paymentSelect = document.getElementById('paymentMethod');
            const manualWarning = document.getElementById('manualPaymentWarning');
            const uploadProofGroup = document.getElementById('uploadProofGroup');

            if (paymentSelect) {
                const checkPaymentType = () => {
                    const selectedOption = paymentSelect.options[paymentSelect.selectedIndex];
                    const paymentType = selectedOption ? selectedOption.getAttribute('data-type') : null;
                    if (paymentType === 'manual') {
                        if (manualWarning) manualWarning.style.display = 'block';
                        if (uploadProofGroup) uploadProofGroup.style.display = 'none';
                    } else {
                        if (manualWarning) manualWarning.style.display = 'none';
                        if (uploadProofGroup) uploadProofGroup.style.display = 'block';
                    }
                };
                paymentSelect.onchange = checkPaymentType;
                checkPaymentType();
            }

            // Submit top up
            const submitTopUp = document.getElementById('submitTopUpBtn');
            if (submitTopUp) {
                submitTopUp.onclick = () => {
                    const paymentSelectEl = document.getElementById('paymentMethod');
                    const selectedOption = paymentSelectEl.options[paymentSelectEl.selectedIndex];
                    const paymentType = selectedOption ? selectedOption.getAttribute('data-type') : null;
                    const paymentLink = selectedOption ? selectedOption.getAttribute('data-link') : null;
                    const coinPackage = document.getElementById('coinPackage').value;

                    if (paymentType === 'manual') {
                        if (paymentLink) {
                            if (confirm(`Anda akan dialihkan ke:\n${paymentLink}\n\nSetelah melakukan pembayaran, admin akan mengapprove top up Anda. Lanjutkan?`)) {
                                const transactions = db.getTransactions();
                                transactions.push({
                                    id: Date.now().toString(),
                                    userId: currentUser.id,
                                    username: currentUser.username,
                                    coins: parseInt(coinPackage),
                                    paymentMethod: selectedOption.value,
                                    proof: 'manual_payment',
                                    status: 'pending_manual',
                                    timestamp: new Date().toISOString(),
                                    manualLink: paymentLink
                                });
                                db.saveTransactions(transactions);
                                showToast('✅ Request top up dikirim!');
                                window.open(paymentLink, '_blank');
                                render();
                            }
                        } else {
                            showToast('❌ Link pembayaran tidak tersedia!', true);
                        }
                    } else {
                        const proofFile = document.getElementById('paymentProof').files[0];
                        if (!proofFile) {
                            showToast('❌ Upload bukti pembayaran!', true);
                            return;
                        }
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const transactions = db.getTransactions();
                            transactions.push({
                                id: Date.now().toString(),
                                userId: currentUser.id,
                                username: currentUser.username,
                                coins: parseInt(coinPackage),
                                paymentMethod: selectedOption.value,
                                proof: e.target.result,
                                status: 'pending',
                                timestamp: new Date().toISOString()
                            });
                            db.saveTransactions(transactions);
                            showToast('✅ Request top up dikirim ke admin!');
                            render();
                        };
                        reader.readAsDataURL(proofFile);
                    }
                };
            }

            // ========== ADMIN FUNCTIONS ==========
            if (currentUser && (currentUser.role === 'admin' || currentUser.role === 'developer')) {
                // Add Product
                const addProduct = document.getElementById('addProductBtn');
                if (addProduct) {
                    addProduct.onclick = () => {
                        const modal = document.createElement('div');
                        modal.innerHTML = `<div class="modal-overlay"><div class="modal-content"><h3>➕ Tambah Produk</h3>
                    <div class="form-group"><label>📁 File Produk (akan didownload pembeli)</label><input type="file" id="productFile"></div>
                    <div class="form-group"><label>📸 Foto Produk (tampilan)</label><input type="file" id="productFoto" accept="image/*"></div>
                    <div class="form-group"><label>📦 Nama Produk</label><input type="text" id="prodNama" placeholder="Nama produk"></div>
                    <div class="form-group"><label>📊 Stok</label><input type="number" id="prodStok" value="10"></div>
                    <div class="form-group"><label>💰 Harga (Coin)</label><input type="number" id="prodHarga" value="100"></div>
                    <button class="btn-primary" id="saveProductBtn">Simpan</button>
                    <button class="btn-primary" id="closeProductBtn" style="background:#666;">Batal</button></div></div>`;
                        document.body.appendChild(modal);

                        document.getElementById('saveProductBtn').onclick = () => {
                            const productFile = document.getElementById('productFile').files[0];
                            const fotoFile = document.getElementById('productFoto').files[0];
                            const nama = document.getElementById('prodNama').value;
                            const stok = parseInt(document.getElementById('prodStok').value);
                            const harga = parseInt(document.getElementById('prodHarga').value);

                            if (!nama || isNaN(stok) || isNaN(harga)) return showToast('❌ Nama, Stok, Harga wajib diisi!', true);
                            if (!productFile) return showToast('❌ File produk wajib diupload!', true);

                            const readerProduct = new FileReader();
                            readerProduct.onload = (eProduct) => {
                                const productData = eProduct.target.result;
                                const processSave = (foto) => {
                                    const products = db.getProducts();
                                    products.push({
                                        id: Date.now().toString(),
                                        foto: foto || 'https://via.placeholder.com/150',
                                        nama: nama,
                                        link: '#',
                                        stok: stok,
                                        hargaCoin: harga,
                                        fileData: productData,
                                        fileName: productFile.name

                                    showToast('✅ Produk berhasil ditambahkan!');
                                    modal.remove();

                                    readerFoto.onload = (eFoto) => processSave(eFoto.target.result);

                                    processSave('');

                            };
                            readerProduct.readAsDataURL(productFile);

                        document.getElementById('closeProductBtn').onclick = () => modal.remove();

                    <button class="btn-primary" id="closeEditBtn" style="background:#666;">Batal</button></div></div>`;

                                render();

                    };

                if (addPayment) {
                    addPayment.onclick = () => {

                    <div class="form-group"><label>Tipe</label><select id="payType"><option value="bank">🏦 Bank</option><option value="ewallet">📱 E-Wallet</option><option value="manual">📞 Manual</option></select></div>
                    <div id="payFields"></div>
                    <button class="btn-primary" id="savePayBtn">Simpan</button>
                    <button class="btn-primary" id="closePayBtn" style="background:#666;">Batal</button></div></div>`;
                        document.body.appendChild(modal);

                        const updateFields = () => {
                            const type = document.getElementById('payType').value;
                            const fields = document.getElementById('payFields');
                            if (type === 'bank') {
                                fields.innerHTML = `<div class="form-group"><input type="text" id="bankName" placeholder="Nama Bank"></div><div class="form-group"><input type="text" id="accNum" placeholder="Nomor Rekening"></div><div class="form-group"><input type="text" id="accName" placeholder="Nama Penerima"></div>`;
                            } else if (type === 'ewallet') {
                                fields.innerHTML = `<div class="form-group"><select id="platform"><option value="dana">DANA</option><option value="ovo">OVO</option><option value="gopay">GOPAY</option></select></div><div class="form-group"><input type="text" id="ewalletNum" placeholder="Nomor"></div><div class="form-group"><input type="text" id="ewalletName" placeholder="Nama Penerima"></div>`;
                            } else {
                                fields.innerHTML = `<div class="form-group"><input type="text" id="contactLink" placeholder="https://t.me/username"></div><div class="form-group"><input type="text" id="manualName" placeholder="Nama Admin"></div>`;
                            }
                        };
                        document.getElementById('payType').onchange = updateFields;
                        updateFields();

                        document.getElementById('savePayBtn').onclick = () => {
                            const type = document.getElementById('payType').value;
                            const methods = db.getPaymentMethods();
                            let newMethod = {
                                id: Date.now().toString(),
                                type
                            };
                            if (type === 'bank') {
                                newMethod.bankName = document.getElementById('bankName').value;
                                newMethod.accountNumber = document.getElementById('accNum').value;
                                newMethod.accountName = document.getElementById('accName').value;
                                if (!newMethod.bankName || !newMethod.accountNumber || !newMethod.accountName) return showToast('❌ Lengkapi data bank!', true);
                            } else if (type === 'ewallet') {
                                newMethod.platform = document.getElementById('platform').value;
                                newMethod.number = document.getElementById('ewalletNum').value;
                                newMethod.name = document.getElementById('ewalletName').value;
                                if (!newMethod.platform || !newMethod.number || !newMethod.name) return showToast('❌ Lengkapi data e-wallet!', true);
                            } else {
                                newMethod.contactLink = document.getElementById('contactLink').value;
                                newMethod.name = document.getElementById('manualName').value || 'Admin';
                                if (!newMethod.contactLink) return showToast('❌ Link kontak wajib diisi!', true);
                            }
                            methods.push(newMethod);
                            db.savePaymentMethods(methods);
                            showToast('✅ Metode pembayaran ditambahkan!');
                            modal.remove();
                            render();
                        };
                        document.getElementById('closePayBtn').onclick = () => modal.remove();
                    };
                }

                // Delete Payment Method
                document.querySelectorAll('.delete-payment-btn').forEach(btn => {
                    btn.onclick = () => {
                        if (confirm('Hapus metode pembayaran ini?')) {
                            let methods = db.getPaymentMethods();
                            methods = methods.filter(m => m.id !== btn.dataset.id);
                            db.savePaymentMethods(methods);
                            showToast('✅ Metode pembayaran dihapus!');
                            render();
                        }
                    };
                });

                // Approve Transaction
                document.querySelectorAll('.approve-btn').forEach(btn => {
                    btn.onclick = () => {
                        const transactions = db.getTransactions();
                        const t = transactions.find(t => t.id === btn.dataset.id);
                        if (t) {
                            t.status = 'approved';
                            const users = db.getUsers();
                            const user = users.find(u => u.id === t.userId);
                            if (user) user.coins += t.coins;
                            db.saveUsers(users);
                            db.saveTransactions(transactions);
                            showToast(`✅ Top up ${t.coins} coin untuk ${t.username} disetujui!`);
                            render();
                        }
                    };
                });

                // Reject Transaction
                document.querySelectorAll('.reject-btn').forEach(btn => {
                    btn.onclick = () => {
                        const transactions = db.getTransactions();
                        const t = transactions.find(t => t.id === btn.dataset.id);
                        if (t) {
                            t.status = 'rejected';
                            db.saveTransactions(transactions);
                            showToast(`❌ Top up untuk ${t.username} ditolak!`);
                            render();
                        }
                    };
                });
            }

            // ========== DEVELOPER ONLY ==========
            if (currentUser && currentUser.role === 'developer') {
                // Add Coin
                document.querySelectorAll('.add-coin-btn').forEach(btn => {
                    btn.onclick = () => {
                        const amount = prompt('Jumlah coin yang ditambahkan:');
                        if (amount && !isNaN(amount) && parseInt(amount) > 0) {
                            const users = db.getUsers();
                            const user = users.find(u => u.email === btn.dataset.email);
                            if (user) {
                                user.coins += parseInt(amount);
                                db.saveUsers(users);
                                showToast(`✅ Berhasil menambah ${amount} coin ke ${user.username}`);
                                render();
                            }
                        } else {
                            showToast('❌ Jumlah coin tidak valid!', true);
                        }
                    };
                });

                // Ban User
                document.querySelectorAll('.ban-user-btn').forEach(btn => {
                    btn.onclick = () => {
                        if (confirm(`Ban user ini?`)) {
                            const users = db.getUsers();
                            const user = users.find(u => u.email === btn.dataset.email);
                            if (user && user.role !== 'developer') {
                                user.isBanned = true;
                                db.saveUsers(users);
                                showToast(`⛔ ${user.username} telah di-ban!`);
                                render();
                            } else {
                                showToast('❌ Tidak bisa ban developer!', true);
                            }
                        }
                    };
                });

                // Delete User
                document.querySelectorAll('.delete-user-btn').forEach(btn => {
                    btn.onclick = () => {
                        if (confirm(`Hapus user ini?`)) {
                            let users = db.getUsers();
                            const user = users.find(u => u.email === btn.dataset.email);
                            if (user && user.role !== 'developer') {
                                users = users.filter(u => u.email !== btn.dataset.email);
                                db.saveUsers(users);
                                showToast(`🗑️ User ${user.username} telah dihapus!`);
                                render();
                            } else {
                                showToast('❌ Tidak bisa hapus developer!', true);
                            }
                        }
                    };
                });

                // Delete Admin
                document.querySelectorAll('.delete-admin-btn').forEach(btn => {
                    btn.onclick = () => {
                        if (confirm(`Hapus admin ini?`)) {
                            const users = db.getUsers();
                            const user = users.find(u => u.email === btn.dataset.email);
                            if (user && user.role === 'admin') {
                                user.role = 'user';
                                db.saveUsers(users);
                                showToast(`✅ Admin ${user.username} telah dihapus!`);
                                render();
                            }
                        }
                    };
                });

                // Add Admin
                const addAdmin = document.getElementById('addAdminBtn');
                if (addAdmin) {
                    addAdmin.onclick = () => {
                        const email = document.getElementById('newAdminEmail').value;
                        const users = db.getUsers();
                        const user = users.find(u => u.email === email);
                        if (user && user.role !== 'developer') {
                            if (user.role === 'admin') {
                                showToast('❌ User ini sudah menjadi admin!', true);
                            } else {
                                user.role = 'admin';
                                db.saveUsers(users);
                                showToast(`✅ ${user.username} sekarang adalah admin!`);
                                render();
                            }
                        } else if (user && user.role === 'developer') {
                            showToast('❌ Tidak bisa mengubah role developer!', true);
                        } else {
                            showToast('❌ User tidak ditemukan!', true);
                        }
                    };
                }
            }
        }

        render();
    </script>
</body>
</html>
