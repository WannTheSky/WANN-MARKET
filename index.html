<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WANN MARKET | Wann Coin Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="app-container" id="app">
        <div id="authContainer"></div>
        <div id="mainApp" class="hidden"></div>
        <div id="bottomNav" class="bottom-nav hidden"></div>
        <button id="chatFab" class="chat-fab hidden"><i class="fas fa-comment"></i></button>
        <div id="chatPanel" class="chat-panel hidden"></div>
    </div>

    <script src="script.js"></script>
    <script>
        // Start the app
        (async () => {
            if (database) {
                setupFirebaseListeners();
                await loadFromFirebase();
            }
            render();
        })();
    </script>
</body>
</html>
